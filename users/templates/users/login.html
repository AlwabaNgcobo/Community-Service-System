{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <h1>User Login</h1>
    <p><a href="{% url 'users:register' %}">Register</a></p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
{% endblock %}
