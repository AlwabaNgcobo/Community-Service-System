{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
    <h1>User Registration</h1>
    <p><a href="{% url 'users:login' %}">Login</a></p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
{% endblock %}
